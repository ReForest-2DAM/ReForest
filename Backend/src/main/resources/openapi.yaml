openapi: 3.0.1
info:
  title: ReForest API
  description: API para la gestión de la plataforma ReForest, que permite a los usuarios realizar donaciones para la reforestación y seguimiento de proyectos.
  version: "0.0.1-SNAPSHOT"
servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local

security:
  - bearerAuth: []

tags:
  - name: Autenticación
    description: Registro e inicio de sesión de usuarios
  - name: Usuarios
    description: Gestión de usuarios del sistema
  - name: Especies
    description: Gestión de las especies de árboles disponibles para reforestación
  - name: Donaciones
    description: Gestión de las donaciones realizadas por los usuarios

paths:
  /auth/register:
    post:
      tags:
        - Autenticación
      summary: Registrar un nuevo usuario
      description: Crea una cuenta de usuario con rol USER y devuelve un token JWT.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiJ9..."
                id: 1
                nombre: "Juan Pérez"
                email: "juan.perez@example.com"
                rol: "USER"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión
      description: Autentica al usuario con email y contraseña y devuelve un token JWT.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                token: "eyJhbGciOiJIUzI1NiJ9..."
                id: 1
                nombre: "Juan Pérez"
                email: "juan.perez@example.com"
                rol: "USER"
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              example:
                code: "UNAUTHORIZED"
                message: "Credenciales incorrectas."

  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Obtener lista de todos los usuarios
      description: Devuelve una lista con todos los usuarios activos registrados en el sistema. Solo accesible para ADMIN.
      operationId: getAllUsuarios
      responses:
        '200':
          description: Lista de usuarios obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
              example:
                - id: 1
                  nombre: "Juan Pérez"
                  email: "juan.perez@example.com"
                  rol: "USER"
                  activo: true
                - id: 2
                  nombre: "Ana López"
                  email: "ana.lopez@example.com"
                  rol: "ADMIN"
                  activo: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Usuarios
      summary: Crear un nuevo usuario
      description: Registra un nuevo usuario en el sistema. Solo accesible para ADMIN.
      operationId: createUsuario
      requestBody:
        description: Datos del nuevo usuario a crear.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '201':
          description: Usuario creado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 3
                nombre: "Carlos Gomez"
                email: "carlos.gomez@example.com"
                rol: "USER"
                activo: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener un usuario por su ID
      description: Devuelve los detalles de un usuario específico buscando por su ID. Solo accesible para ADMIN.
      operationId: getUsuarioById
      parameters:
        - name: id
          in: path
          description: ID del usuario a obtener
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nombre: "Juan Pérez"
                email: "juan.perez@example.com"
                rol: "USER"
                activo: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Usuarios
      summary: Actualizar un usuario existente (completo)
      description: Modifica todos los datos de un usuario existente buscando por su ID. Solo accesible para ADMIN.
      operationId: updateUsuario
      parameters:
        - name: id
          in: path
          description: ID del usuario a actualizar
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Objeto completo del usuario con los datos actualizados.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
      responses:
        '200':
          description: Usuario actualizado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nombre: "Juan Pérez Actualizado"
                email: "juan.perez.new@example.com"
                rol: "USER"
                activo: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Usuarios
      summary: Actualizar parcialmente un usuario
      description: Actualiza uno o más campos de un usuario existente. Solo accesible para ADMIN.
      operationId: patchUsuario
      parameters:
        - name: id
          in: path
          description: ID del usuario a actualizar
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Campos a actualizar (nombre, email, contrasena, rol).
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                email: "nuevo.email@example.com"
                nombre: "Nombre Actualizado"
      responses:
        '200':
          description: Usuario actualizado con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nombre: "Juan Pérez"
                email: "juan.perez.new@example.com"
                rol: "USER"
                activo: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Usuarios
      summary: Desactivar un usuario (borrado lógico)
      description: Realiza un borrado lógico del usuario, marcándolo como inactivo. El usuario no se elimina de la base de datos. Solo accesible para ADMIN.
      operationId: deleteUsuario
      parameters:
        - name: id
          in: path
          description: ID del usuario a desactivar
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Usuario desactivado con éxito. No hay contenido en la respuesta.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /especies:
    get:
      tags:
        - Especies
      summary: Obtener lista de todas las especies
      description: Devuelve una lista con todas las especies de árboles. Se puede filtrar por disponibilidad y zona geográfica.
      operationId: getAllEspecies
      parameters:
        - name: disponible
          in: query
          description: Filtrar por disponibilidad (true/false)
          required: false
          schema:
            type: boolean
        - name: zonaGeografica
          in: query
          description: Filtrar por zona geográfica (búsqueda parcial)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de especies obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Especie'
              example:
                - id: 1
                  nombreComun: "Pino Carrasco"
                  precioPlantacion: 15.50
                  disponible: true
                - id: 2
                  nombreComun: "Encina"
                  precioPlantacion: 25.00
                  disponible: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Especies
      summary: Crear una nueva especie
      description: Registra una nueva especie de árbol en el sistema. Solo accesible para ADMIN.
      operationId: createEspecie
      requestBody:
        description: Datos de la nueva especie a crear.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EspecieInput'
      responses:
        '201':
          description: Especie creada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Especie'
              example:
                id: 3
                nombreComun: "Roble"
                descripcion: "Árbol robusto de hoja caduca."
                precioPlantacion: 30.00
                zonaGeografica: "Clima Atlántico"
                co2AnualKg: 25.0
                alturaMaximaM: 40
                disponible: true
                fechaTemporada: "2026-10-01"
                imageUrl: "http://example.com/images/roble.jpg"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /especies/{id}:
    get:
      tags:
        - Especies
      summary: Obtener una especie por su ID
      description: Devuelve los detalles de una especie específica.
      operationId: getEspecieById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Especie encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Especie'
              example:
                id: 1
                nombreComun: "Pino Carrasco"
                descripcion: "Conífera resistente a la sequía."
                precioPlantacion: 15.50
                zonaGeografica: "Mediterráneo"
                co2AnualKg: 22.5
                alturaMaximaM: 20
                disponible: true
                fechaTemporada: "2026-09-15"
                imageUrl: "http://example.com/images/pino.jpg"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Especies
      summary: Actualizar una especie existente
      description: Actualiza todos los datos de una especie existente. Solo accesible para ADMIN.
      operationId: updateEspecie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EspecieInput'
      responses:
        '200':
          description: Especie actualizada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Especie'
              example:
                id: 1
                nombreComun: "Pino Carrasco (Actualizado)"
                precioPlantacion: 16.00
                disponible: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Especies
      summary: Actualizar parcialmente una especie
      description: Actualiza uno o más campos de una especie existente. Solo accesible para ADMIN.
      operationId: patchEspecie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Campos a actualizar (disponible, precioPlantacion, etc.).
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                disponible: false
                precioPlantacion: 18.00
      responses:
        '200':
          description: Especie actualizada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Especie'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Especies
      summary: Desactivar una especie (borrado lógico)
      description: Realiza un borrado lógico de la especie, marcándola como no disponible. La especie no se elimina de la base de datos. Solo accesible para ADMIN.
      operationId: deleteEspecie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Especie desactivada con éxito.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /donaciones:
    get:
      tags:
        - Donaciones
      summary: Obtener lista de todas las donaciones
      description: Devuelve un listado de donaciones. Se puede filtrar por estado y/o ID de usuario.
      operationId: getAllDonaciones
      parameters:
        - name: estado
          in: query
          description: Filtrar por estado de la donación (ej. COMPLETADA, CANCELADA)
          required: false
          schema:
            type: string
        - name: usuarioId
          in: query
          description: Filtrar por el ID del usuario que realizó la donación
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de donaciones obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Donacion'
              example:
                - id: 1
                  fecha: "2026-02-06"
                  nombreDonante: "Ana López"
                  cantidadArboles: 10
                  totalDonado: 155.00
                  estado: "COMPLETADA"
                  pagado: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Donaciones
      summary: Crear una nueva donación
      description: Crea una donación vinculada a un usuario y una especie. El total se calcula automáticamente.
      operationId: createDonacion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DonacionInput'
      responses:
        '201':
          description: Donación creada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
              example:
                id: 2
                fecha: "2026-02-07"
                nombreDonante: "Carlos Gomez"
                cantidadArboles: 5
                totalDonado: 77.50
                estado: "COMPLETADA"
                pagado: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Usuario o especie no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: La especie no está disponible para donaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 409
                message: "The species 'Encina' is not available for donation."
        '500':
          $ref: '#/components/responses/InternalServerError'

  /donaciones/{id}:
    get:
      tags:
        - Donaciones
      summary: Obtener una donación por su ID
      operationId: getDonacionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Donación encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
              example:
                id: 1
                fecha: "2026-02-06"
                nombreDonante: "Ana López"
                cantidadArboles: 10
                totalDonado: 155.00
                estado: "COMPLETADA"
                pagado: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Donaciones
      summary: Modificar una donación (completo)
      description: Actualiza todos los datos de una donación existente.
      operationId: updateDonacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DonacionInput'
      responses:
        '200':
          description: Donación modificada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Donaciones
      summary: Modificar una donación (parcial)
      description: Actualiza uno o más campos de una donación, como el estado o si ha sido pagada.
      operationId: patchDonacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Campos a actualizar (estado, pagado, nombre_donante).
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                estado: "CANCELADA"
                pagado: true
      responses:
        '200':
          description: Donación modificada con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Donaciones
      summary: Cancelar una donación (borrado lógico)
      description: Realiza un borrado lógico de la donación, cambiando su estado a CANCELADA.
      operationId: deleteDonacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Donación cancelada con éxito.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - contrasena
      properties:
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        contrasena:
          type: string
          format: password
          example: "password123"

    RegisterRequest:
      type: object
      required:
        - nombre
        - email
        - contrasena
      properties:
        nombre:
          type: string
          example: "Juan Pérez"
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        contrasena:
          type: string
          format: password
          example: "password123"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT para usar en las siguientes peticiones.
          example: "eyJhbGciOiJIUzI1NiJ9..."
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Juan Pérez"
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        rol:
          type: string
          enum: [USER, ADMIN]
          example: "USER"

    Usuario:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador único del usuario.
          readOnly: true
        nombre:
          type: string
          description: Nombre completo del usuario.
          example: "Juan Pérez"
        email:
          type: string
          format: email
          description: Dirección de correo electrónico del usuario.
          example: "juan.perez@example.com"
        rol:
          type: string
          description: Rol del usuario en el sistema.
          enum: [USER, ADMIN]
          example: "USER"
        activo:
          type: boolean
          description: Indica si el usuario está activo. Un usuario desactivado no puede iniciar sesión.
          example: true

    UsuarioInput:
      type: object
      required:
        - nombre
        - email
        - contrasena
        - rol
      properties:
        nombre:
          type: string
          description: Nombre completo del usuario.
          example: "Juan Pérez"
        email:
          type: string
          format: email
          description: Dirección de correo electrónico del usuario.
          example: "juan.perez@example.com"
        contrasena:
          type: string
          format: password
          description: Contraseña del usuario (mínimo 6 caracteres).
          example: "password123"
          writeOnly: true
        rol:
          type: string
          description: Rol del usuario en el sistema.
          enum: [USER, ADMIN]
          example: "USER"

    Especie:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        nombreComun:
          type: string
        descripcion:
          type: string
        precioPlantacion:
          type: number
          format: double
        zonaGeografica:
          type: string
        co2AnualKg:
          type: number
          format: double
        alturaMaximaM:
          type: integer
        disponible:
          type: boolean
        fechaTemporada:
          type: string
          format: date
        imageUrl:
          type: string
          format: uri

    EspecieInput:
      type: object
      required:
        - nombreComun
        - precioPlantacion
      properties:
        nombreComun:
          type: string
        descripcion:
          type: string
        precioPlantacion:
          type: number
          format: double
        zonaGeografica:
          type: string
        co2AnualKg:
          type: number
          format: double
        alturaMaximaM:
          type: integer
        disponible:
          type: boolean
        fechaTemporada:
          type: string
          format: date
        imageUrl:
          type: string
          format: uri

    Donacion:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        fecha:
          type: string
          format: date
        nombreDonante:
          type: string
        cantidadArboles:
          type: integer
          minimum: 1
        totalDonado:
          type: number
          format: double
        estado:
          type: string
          enum: [COMPLETADA, CANCELADA, PENDIENTE]
        pagado:
          type: boolean

    DonacionInput:
      type: object
      required:
        - nombreDonante
        - cantidadArboles
        - especie
        - usuario
      properties:
        nombreDonante:
          type: string
          example: "Ana López"
        cantidadArboles:
          type: integer
          minimum: 1
          example: 10
        especie:
          type: object
          properties:
            id:
              type: integer
              format: int64
              example: 1
        usuario:
          type: object
          properties:
            id:
              type: integer
              format: int64
              example: 2

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Código de error HTTP.
          example: 404
        message:
          type: string
          description: Descripción del error.
          example: "El recurso solicitado no fue encontrado."

  responses:
    Unauthorized:
      description: No autenticado. Se requiere un token JWT válido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: "No autenticado. Incluye un token JWT válido en la cabecera Authorization."
    Forbidden:
      description: No autorizado. No tienes permisos suficientes para esta operación.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: "Acceso denegado. Se requiere rol ADMIN."
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: "El recurso solicitado no se ha encontrado."
    BadRequest:
      description: Solicitud incorrecta
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 400
            message: "Los datos de la solicitud son inválidos."
    Conflict:
      description: Conflicto de datos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 409
            message: "Conflicto de datos. Probablemente un campo único (como el email) ya existe."
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: "Ha ocurrido un error inesperado en el servidor."
